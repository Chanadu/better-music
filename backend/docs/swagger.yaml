basePath: /
definitions:
  handlers.ArtistIDRequest:
    properties:
      artist_id:
        example: 1
        type: integer
    type: object
  handlers.AuthRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: password123
        type: string
    type: object
  handlers.CreateAlbumRequest:
    properties:
      artist_id:
        example: 1
        type: integer
      title:
        example: Abbey Road
        type: string
    type: object
  handlers.CreateArtistRequest:
    properties:
      name:
        example: The Beatles
        type: string
    type: object
  handlers.SpotifyAlbumArtist:
    properties:
      id:
        example: 4Z8W4fKeB5YxbusRsdQVPb
        type: string
      name:
        example: Radiohead
        type: string
    type: object
  handlers.SpotifyAlbumSearchResult:
    properties:
      artists:
        items:
          $ref: '#/definitions/handlers.SpotifyAlbumArtist'
        type: array
      id:
        example: 6ZG5lRT77aJ3btmArcykra
        type: string
      images:
        items:
          $ref: '#/definitions/handlers.SpotifyImage'
        type: array
      name:
        example: OK Computer
        type: string
      release_date:
        example: "1997-05-21"
        type: string
    type: object
  handlers.SpotifyArtistSearchResult:
    properties:
      id:
        example: 4Z8W4fKeB5YxbusRsdQVPb
        type: string
      images:
        items:
          $ref: '#/definitions/handlers.SpotifyImage'
        type: array
      name:
        example: Radiohead
        type: string
    type: object
  handlers.SpotifyImage:
    properties:
      height:
        example: 640
        type: integer
      url:
        example: https://i.scdn.co/image/ab67616d00001e02
        type: string
      width:
        example: 640
        type: integer
    type: object
  handlers.TokenResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  handlers.UpdateAlbumRequest:
    properties:
      artist_id:
        example: 1
        type: integer
      comment:
        example: Classic album
        type: string
      cover_url:
        example: https://example.com/cover.jpg
        type: string
      listened:
        example: true
        type: boolean
      listened_at:
        example: "2024-01-15"
        type: string
      rating:
        example: 5
        type: integer
      spotify_id:
        example: 4oDw9mW4Sro2zN1RHzlvOr
        type: string
      title:
        example: Abbey Road
        type: string
      year:
        example: 1969
        type: integer
    type: object
  handlers.UpdateArtistRequest:
    properties:
      name:
        example: The Beatles
        type: string
      spotify_id:
        example: 6ml0jHmy7SNFWckrZblO5B
        type: string
    type: object
  models.Album:
    properties:
      artist_id:
        type: integer
      comment:
        type: string
      cover_url:
        type: string
      created_at:
        type: string
      id:
        type: integer
      listened:
        type: boolean
      listened_at:
        type: string
      rating:
        type: integer
      spotify_id:
        type: string
      title:
        type: string
      year:
        type: integer
    type: object
  models.Artist:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      spotify_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A music management API with artists and albums
  title: Better Music API
  version: "1.0"
paths:
  /api/albums:
    get:
      description: Get all albums for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Album'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get all albums
      tags:
      - albums
    post:
      consumes:
      - application/json
      description: Create a new album for an artist
      parameters:
      - description: Album data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAlbumRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Album'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Album already exists
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Create a new album
      tags:
      - albums
  /api/albums/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an album by ID
      parameters:
      - description: Album ID
        in: path
        name: id
        required: true
        type: integer
      - description: Artist ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ArtistIDRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Album or artist not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete an album
      tags:
      - albums
    get:
      consumes:
      - application/json
      description: Get a specific album by ID
      parameters:
      - description: Album ID
        in: path
        name: id
        required: true
        type: integer
      - description: Artist ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ArtistIDRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Album'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Album or artist not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get a specific album
      tags:
      - albums
    put:
      consumes:
      - application/json
      description: Update an album's information
      parameters:
      - description: Album ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateAlbumRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request or no fields provided
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Album or artist not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Update an album
      tags:
      - albums
  /api/artists:
    get:
      description: Get all artists for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Artist'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get all artists
      tags:
      - artists
    post:
      consumes:
      - application/json
      description: Create a new artist for the authenticated user
      parameters:
      - description: Artist data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateArtistRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Artist'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Artist already exists
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Create a new artist
      tags:
      - artists
  /api/artists/{id}:
    delete:
      description: Delete an artist by ID (must have no albums)
      parameters:
      - description: Artist ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Artist has albums
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Artist not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete an artist
      tags:
      - artists
    get:
      description: Get a specific artist by ID for the authenticated user
      parameters:
      - description: Artist ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Artist'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Artist not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get a specific artist
      tags:
      - artists
    put:
      consumes:
      - application/json
      description: Update an artist's name and/or Spotify ID
      parameters:
      - description: Artist ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateArtistRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request or no fields provided
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Artist not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Update an artist
      tags:
      - artists
  /api/artists/{id}/albums:
    get:
      description: Get all albums for a specific artist
      parameters:
      - description: Artist ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Album'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Artist not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get all albums by an artist
      tags:
      - artists
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password to receive a JWT token
      parameters:
      - description: User credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TokenResponse'
        "400":
          description: Invalid JSON
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account and receive a JWT token
      parameters:
      - description: User credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AuthRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.TokenResponse'
        "400":
          description: Invalid JSON or missing fields
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Email already in use
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /api/spotify/search/albums:
    get:
      description: Search Spotify for albums and return trimmed results for the authenticated user
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      - description: Max results (1-10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.SpotifyAlbumSearchResult'
            type: array
        "400":
          description: Missing or invalid query parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Spotify request failed
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Spotify is not configured
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Search Spotify albums
      tags:
      - spotify
  /api/spotify/search/artists:
    get:
      description: Search Spotify for artists and return trimmed results for the authenticated user
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      - description: Max results (1-10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.SpotifyArtistSearchResult'
            type: array
        "400":
          description: Missing or invalid query parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Spotify request failed
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Spotify is not configured
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Search Spotify artists
      tags:
      - spotify
schemes:
- http
securityDefinitions:
  Bearer:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
